name: NFL Projections Scraper

on:
  workflow_dispatch:   # manual-run only — trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape FantasyPros season projections
        run: python scripts/fetch_nfl_projections.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfl-props/data.json
          git diff --staged --quiet || git commit -m "chore: refresh NFL projections [skip ci]"
          git push
