name: NFL Projections Scraper

on:
  workflow_dispatch:   # manual-run only — trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps for Clay PDF parser
        run: pip install pdfplumber

      - name: Scrape FantasyPros consensus projections
        run: python scripts/fetch_nfl_projections.py

      - name: Scrape Mike Clay projections (ESPN PDF)
        run: python scripts/fetch_clay_projections.py
        continue-on-error: true

      - name: Scrape NFL.com Fantasy projections
        run: python scripts/fetch_nfl_com_projections.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfl-props/data.json nfl-props/clay.json nfl-props/nflcom.json
          git diff --staged --quiet || git commit -m "chore: refresh NFL projections [skip ci]"
          git push
