name: NFL Props Scraper

on:
  workflow_dispatch:         # manual-run only — trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch NFL props from The Odds API
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_nfl_props.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfl-props/data.json
          git diff --staged --quiet || git commit -m "chore: refresh NFL props [skip ci]"
          git push
