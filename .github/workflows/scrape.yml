name: Scrape Markets

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and match markets
        env:
          KALSHI_EMAIL:    ${{ secrets.KALSHI_EMAIL }}
          KALSHI_PASSWORD: ${{ secrets.KALSHI_PASSWORD }}
        run: node scripts/scrape.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arbitrage/data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data [skip ci]"
          git push
